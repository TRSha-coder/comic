<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comic Hub - 动漫在线观看</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-content">
            <div class="logo">
                <i class="fas fa-film"></i>
                <span>Comic Hub</span>
            </div>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="搜索动漫...">
            </div>
            <div class="header-actions">
                <button id="favoritesBtn" class="icon-btn" title="我的收藏">
                    <i class="fas fa-heart"></i>
                    <span id="favoritesCount">0</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Filters -->
    <div class="filters">
        <div class="filter-group">
            <label>类型:</label>
            <select id="typeFilter">
                <option value="">全部</option>
                <option value="TV">TV</option>
                <option value="Movie">剧场版</option>
                <option value="OVA">OVA</option>
                <option value="Special">SP</option>
            </select>
        </div>
        <div class="filter-group">
            <label>评分:</label>
            <select id="scoreFilter">
                <option value="">全部</option>
                <option value="9">9+</option>
                <option value="8">8+</option>
                <option value="7">7+</option>
            </select>
        </div>
        <div class="filter-group">
            <label>状态:</label>
            <select id="statusFilter">
                <option value="">全部</option>
                <option value="Finished">已完成</option>
                <option value="Currently Airing">更新中</option>
                <option value="Not yet aired">未开播</option>
            </select>
        </div>
        <button id="showFavoritesOnly" class="filter-btn">
            <i class="fas fa-heart"></i> 仅看收藏
        </button>
    </div>

    <!-- Stats -->
    <div class="stats">
        <span id="totalCount">共 0 部动漫</span>
    </div>

    <!-- Main Content -->
    <main>
        <div id="animeGrid" class="anime-grid">
            <!-- Anime cards will be inserted here -->
        </div>
    </main>

    <!-- Loading -->
    <div id="loading" class="loading">
        <i class="fas fa-spinner fa-spin"></i>
        <p>加载中...</p>
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="empty-state">
        <i class="fas fa-search"></i>
        <p>没有找到匹配的动漫</p>
    </div>

    <!-- Anime Detail Modal -->
    <div id="animeModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" id="modalClose">
                <i class="fas fa-times"></i>
            </button>
            <div class="modal-body">
                <div class="modal-image">
                    <img id="modalImage" src="" alt="">
                </div>
                <div class="modal-info">
                    <h2 id="modalTitle"></h2>
                    <p id="modalTitleEnglish" class="english-title"></p>
                    <div class="modal-meta">
                        <span class="badge" id="modalType"></span>
                        <span class="badge" id="modalEpisodes"></span>
                        <span class="badge" id="modalStatus"></span>
                    </div>
                    <div class="modal-rating">
                        <i class="fas fa-star"></i>
                        <span id="modalScore"></span>
                        <span class="rank">#<span id="modalRank"></span></span>
                    </div>
                    <div class="modal-genres" id="modalGenres"></div>
                    <div class="modal-studios" id="modalStudios"></div>
                    <p class="modal-synopsis" id="modalSynopsis"></p>
                    <div class="modal-actions">
                        <a id="modalLink" href="" target="_blank" class="btn btn-primary">
                            <i class="fas fa-external-link-alt"></i> 在MyAnimeList查看
                        </a>
                        <button id="modalFavorite" class="btn btn-secondary">
                            <i class="fas fa-heart"></i> 添加收藏
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
